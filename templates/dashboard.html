<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- page title and icon -->
    <title>Dashboard</title>
</head>
<body class="min-h-dvh bg-sky-950 flex flex-col">
    <!-- menorah header -->
    <div class="py-5 bg-sky-950 border-b-2 border-gray-300">
        <div class="pl-5 font-extrabold text-3xl text-gray-50">
            menorah.
        </div>
    </div>
    <!-- dashboard info -->
    <div class="p-2 flex flex-col flex-1 gap-y-2 bg-gray-50">
        <!-- presence detection -->
        <!-- disable lighting upon departure and enable upon arrival -->
        <div class="py-4 rounded-xl text-xl text-sky-950 bg-gray-300 border border-sky-950">
            <div class="pl-4">
                <div class="font-semibold">
                    Presence Detection
                </div>
                <div class="font-light">
                    Sunlime's iPhone
                </div>
                <div class="font-light">
                    aa:bb:cc:dd:ee:ff
                </div>
            </div>
        </div>
        <!-- sleep management -->
        <!-- taper lighting intensity to maintain a consistent sleep schedule -->
        <div class="py-4 rounded-xl text-xl text-sky-950 bg-gray-300 border border-sky-950">
            <div class="pl-4">
                <div class="font-semibold">
                    Sleep Management
                </div>
                <div class="font-light">
                    Wake: 6:00-6:30
                </div>
                <div class="font-light">
                    Sleep: 9:30-10:30
                </div>
            </div>
        </div>
        <!-- daily schedule -->
        <!-- adjust lighting based on time of day or sun position-->
        <div class="py-4 rounded-xl text-xl text-sky-950 bg-gray-300 border border-sky-950">
            <div class="pl-4">
                <div class="font-semibold">
                    Daily Schedule
                </div>
                <div class="font-light">
                    Mode: Extended Natural
                </div>
            </div>
        </div>
        <!-- system override -->
        <!-- stop lighting control service from making changes -->
        <div class="flex flex-col rounded-xl text-xl bg-gray-300 border border-sky-950">
            <div class="p-4 font-semibold text-sky-950">
                System Override
            </div>
            <div class="px-2 pb-2 font-light text-gray-300 flex flex-col gap-y-2">
                <a href="/" class="p-4 rounded-xl bg-sky-950">Lights on</a>
                <a href="/" class="p-4 rounded-xl bg-sky-950">Lights off</a>
                <a href="/" class="p-4 rounded-xl bg-sky-950">Return to schedule</a>
            </div>
        </div>
    </div>
</body>
</html>
